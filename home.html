<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Suru Chatbot</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body id="body">

<!-- ============ TOP BAR ============ -->
<div class="topbar">
  <div class="topbar-row">
    <button class="menu-btn" onclick="openSideMenu()"><i></i><i></i><i></i></button>
    <div class="app-title brand">Suru chatbot</div>
    <div style="width:26px"></div>
  </div>

  <div class="icon-nav">
    <button class="active" title="Home">🏠</button>
    <button onclick="location.href='video.html'" title="Video">🎬</button>
    <button onclick="comingSoon('প্রোফাইল')" title="Profile">👤</button>
    <button onclick="location.href='chatlist.html'" title="Chat">
      💬<span class="badge-dot hidden" id="reqDot"></span>
    </button>
    <button onclick="comingSoon('নোটিফিকেশন')" title="Notifications">
      🔔<span class="badge-dot hidden" id="notifDot"></span>
    </button>
  </div>
</div>

<!-- ============ SIDE MENU ============ -->
<div class="side-menu-backdrop" id="sideBackdrop" onclick="closeSideMenu()"></div>
<div class="side-menu" id="sideMenu">
  <div class="side-menu-item" onclick="comingSoon('সেটিং')"><span class="ic">⚙️</span> Setting</div>
  <div class="side-menu-item" onclick="logout()"><span class="ic">🚪</span> Log out</div>
  <div class="side-menu-item" onclick="comingSoon('আরেকটি আইডি যোগ')"><span class="ic">➕</span> Add another account</div>
  <div class="side-menu-item" onclick="openLikedList()"><span class="ic">👍</span> Liked</div>
  <div class="side-menu-item" onclick="openSavedList()"><span class="ic">🔖</span> Saved</div>
  <div class="side-menu-item" onclick="comingSoon('ভিডিও')"><span class="ic">🎬</span> Watched videos</div>
  <div style="margin-top:10px;font-size:12px;font-weight:700;opacity:.6;">THEME</div>
  <div class="theme-toggle">
    <button id="themeDarkBtn" onclick="setTheme('dark')">Dark</button>
    <button id="themeLightBtn" onclick="setTheme('light')">Light</button>
  </div>
</div>

<!-- ============ MAIN ============ -->
<div class="container">

  <div class="profile-strip">
    <div class="avatar" id="myAvatar">?</div>
    <button class="composer-box" onclick="openComposer()">
      <span id="composerPlaceholder">What's on your mind?</span>
      <span>🖼️</span>
    </button>
  </div>

  <div class="search-row">
    <div class="search-box">
      <span>🔍</span>
      <input id="searchInput" placeholder="Search friend by phone number" inputmode="tel" oninput="onSearchInput()" />
    </div>
  </div>
  <div class="search-results hidden" id="searchResults"></div>

  <div id="feed">
    <div class="empty-state" id="feedLoading">
      <div class="ic">⏳</div>
      পোস্ট লোড হচ্ছে...
    </div>
  </div>
</div>

<button class="fab" onclick="openComposer()">+</button>

<!-- ============ COMPOSE MODAL ============ -->
<div class="modal-backdrop" id="composeBackdrop">
  <div class="compose-modal">
    <div class="compose-head">
      <div style="font-weight:700;font-size:16px;" id="composeTitle">নতুন পোস্ট</div>
      <button class="close" onclick="closeComposer()">✕</button>
    </div>
    <textarea class="compose-textarea" id="composeText" placeholder="What's on your mind?"></textarea>
    <div id="composePreviewWrap"></div>
    <input type="file" id="composeFile" accept="image/*,video/*" class="hidden" onchange="onFilePicked(event)">
    <div class="compose-attach">
      <label for="composeFile">🖼️ Photo / 🎬 Video</label>
    </div>
    <button class="btn btn-primary btn-block" style="margin-top:16px;" onclick="submitPost()" id="submitPostBtn">Post</button>
  </div>
</div>

<!-- ============ POST OPTIONS SHEET ============ -->
<div class="sheet-backdrop" id="sheetBackdrop" onclick="closeSheet()"></div>
<div class="sheet" id="postSheet"></div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/theme.js"></script>
<script src="js/feed.js"></script>
<script src="js/callSignal.js"></script>
<script src="js/push.js"></script>
</body>
</html>
